<!DOCTYPE html>
<html>
<head>
    <title>Citizen Grievance Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">📝 Submit Complaint</h2>

        <h3 class="text-center mb-3">🏛 Citizen Grievance Portal</h3>
        <p class="text-center text-muted">Submit and track your complaints easily</p>

        <form action="/submit" method="POST">
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" name="title" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Category</label>
                <select name="category" class="form-control" required>
                   <option value="">Select Category</option>
                   <option value="Water">Water</option>
                   <option value="Roads">Roads</option>
                   <option value="Sanitation">Sanitation</option>
                   <option value="Electricity">Electricity</option>
                   <option value="Others">Others</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                🚀 Submit Complaint
            </button>
        </form>
    </div>
</div>

</body>
</html>
