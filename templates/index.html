<!DOCTYPE html>
<html>
<head>
    <title>Citizen Grievance Portal</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            margin: 0;
        }

        header {
            background: white;
            padding: 20px;
            border-bottom: 1px solid #ddd;
        }

        h1 {
            margin: 0;
        }

        .container {
            max-width: 700px;
            margin: 30px auto;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            background: #2563eb;
            color: white;
            padding: 12px;
            border: none;
            width: 100%;
            border-radius: 5px;
            font-size: 16px;
        }

        button:hover {
            background: #1e40af;
        }

        small {
            color: gray;
        }

        .admin-link {
            text-align: center;
            margin-top: 20px;
        }

        .admin-link a {
            text-decoration: none;
            color: #2563eb;
        }
    </style>
</head>

<body>

<header>
    <h1>Citizen Grievance Portal</h1>
    <p>Report issues · Track progress · Get resolution</p>
</header>

<div class="container">
    <div class="card">

        <h2>Submit Complaint</h2>

        <form action="/submit" method="POST">

            <!-- Title -->
            <label>
                Title 
                <small>(short summary, e.g. "Water leakage")</small>
            </label>
            <input type="text" name="title" placeholder="Enter a short summary" required>

            <!-- Name -->
            <label>Name</label>
            <input type="text" name="name" required>

            <!-- Email -->
            <label>Email</label>
            <input type="email" name="email" required>

            <!-- Category -->
            <label>Category</label>
            <select name="category" required>
                <option value="">Select category</option>
                <option>Water</option>
                <option>Electricity</option>
                <option>Road</option>
                <option>Sanitation</option>
            </select>

            <!-- Description -->
            <label>Description</label>
            <textarea name="description" rows="4" placeholder="Describe your issue..." required></textarea>

            <!-- Submit -->
            <button type="submit">Submit Complaint</button>

        </form>

        <div class="admin-link">
            <p><a href="/admin">Go to Admin Dashboard</a></p>
        </div>

    </div>
</div>

</body>
</html>
