<!DOCTYPE html>
<html>
<head>
    <title>Feedback</title>
</head>
<body>

<h2>Give Feedback</h2>

<form method="POST">

    <label>Rating (1–5)</label>
    <input type="number" name="rating" min="1" max="5" required>

    <label>Feedback</label>
    <textarea name="feedback" required></textarea>

    <button type="submit">Submit Feedback</button>

</form>

</body>
</html>
